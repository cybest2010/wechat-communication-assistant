<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>微信沟通助手</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; background: #f5f5f5; color: #333; }
  .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  h1 { font-size: 18px; font-weight: 600; color: #111; }
  .mode-switch { display: flex; gap: 8px; align-items: center; }
  .toggle { position: relative; display: inline-block; width: 48px; height: 24px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .3s; border-radius: 24px; }
  .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
  input:checked + .slider { background-color: #07c160; }
  input:checked + .slider:before { transform: translateX(24px); }
  .mode-label { font-size: 13px; color: #666; }
  .mode-label.active { color: #07c160; font-weight: 600; }
  .layout { display: flex; gap: 16px; }
  .left-panel { flex: 1; }
  .right-panel { flex: 1; }
  .card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .card-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: #111; }
  .messages-container { max-height: 600px; overflow-y: auto; }
  .message-item { border: 1.5px solid #e8e8e8; border-radius: 10px; padding: 12px; margin-bottom: 8px; cursor: pointer; transition: all 0.15s; }
  .message-item:hover { border-color: #07c160; background: #f6ffed; }
  .message-item.selected { border-color: #07c160; background: #e8f9ee; }
  .message-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .message-contact { font-size: 13px; font-weight: 600; color: #111; }
  .message-time { font-size: 11px; color: #999; }
  .message-content { font-size: 14px; color: #333; line-height: 1.4; }
  .empty-state { text-align: center; padding: 40px 20px; color: #999; font-size: 13px; }
  .label { font-size: 12px; color: #888; margin-bottom: 6px; }
  .goal-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .goal-btn { border: 1.5px solid #ddd; background: #fff; border-radius: 20px; padding: 6px 14px; font-size: 13px; cursor: pointer; transition: all 0.15s; }
  .goal-btn.active { border-color: #07c160; background: #e8f9ee; color: #07c160; }
  .goal-btn:hover { border-color: #07c160; }
  textarea { width: 100%; border: 1.5px solid #e0e0e0; border-radius: 8px; padding: 10px; font-size: 14px; resize: vertical; min-height: 80px; outline: none; font-family: inherit; }
  textarea:focus { border-color: #07c160; }
  .btn { background: #07c160; color: #fff; border: none; border-radius: 8px; padding: 10px 24px; font-size: 14px; cursor: pointer; width: 100%; margin-top: 10px; }
  .btn:hover { background: #06ad56; }
  .btn:disabled { background: #ccc; cursor: not-allowed; }
  .btn-secondary { background: #fff; color: #07c160; border: 1.5px solid #07c160; }
  .btn-secondary:hover { background: #f6ffed; }
  .analysis { font-size: 13px; color: #555; line-height: 1.6; padding: 10px; background: #f9f9f9; border-radius: 8px; margin-bottom: 10px; }
  .tip { font-size: 12px; color: #fa8c16; background: #fff7e6; border-radius: 6px; padding: 6px 10px; margin-bottom: 6px; }
  .framework-tip { font-size: 12px; color: #1677ff; background: #e6f4ff; border-radius: 6px; padding: 6px 10px; margin-bottom: 10px; }
  .reply-item { border: 1.5px solid #e8e8e8; border-radius: 10px; padding: 12px; margin-bottom: 8px; position: relative; }
  .reply-item.recommended { border-color: #07c160; background: #f6ffed; }
  .reply-badge { position: absolute; top: -8px; left: 12px; background: #07c160; color: #fff; font-size: 11px; padding: 1px 8px; border-radius: 10px; }
  .reply-text { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
  .reply-reason { font-size: 12px; color: #888; }
  .copy-btn { float: right; background: #f0f0f0; border: none; border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer; margin-top: -2px; }
  .copy-btn:hover { background: #e0e0e0; }
  .copy-btn.copied { background: #d4edda; color: #28a745; }
  .avoid-item { font-size: 13px; color: #666; padding: 6px 0; border-bottom: 1px solid #f0f0f0; }
  .avoid-item:last-child { border-bottom: none; }
  .avoid-text { color: #ff4d4f; font-weight: 500; }
  .avoid-reason { color: #999; }
  .section-title { font-size: 13px; font-weight: 600; color: #333; margin-bottom: 8px; }
  .contact-input { display: flex; gap: 8px; margin-bottom: 12px; }
  .contact-input input { flex: 1; border: 1.5px solid #e0e0e0; border-radius: 8px; padding: 8px 12px; font-size: 14px; outline: none; }
  .contact-input input:focus { border-color: #07c160; }
  .loading { text-align: center; color: #888; padding: 20px; font-size: 14px; }
  .status-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .status-badge.connected { background: #d4edda; color: #28a745; }
  .status-badge.disconnected { background: #f8d7da; color: #dc3545; }
  .manual-mode { display: none; }
  .manual-mode.active { display: block; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>微信沟通助手</h1>
    <div class="mode-switch">
      <span class="mode-label" id="manualLabel">手动模式</span>
      <label class="toggle">
        <input type="checkbox" id="modeToggle" checked>
        <span class="slider"></span>
      </label>
      <span class="mode-label active" id="autoLabel">自动模式</span>
      <span class="status-badge disconnected" id="statusBadge">未连接</span>
    </div>
  </div>

  <div class="layout">
    <!-- 左侧：消息列表（自动模式） -->
    <div class="left-panel" id="autoMode">
      <div class="card">
        <div class="card-title">实时消息</div>
        <div class="messages-container" id="messagesContainer">
          <div class="empty-state">等待新消息...</div>
        </div>
      </div>
    </div>

    <!-- 手动模式输入 -->
    <div class="left-panel manual-mode" id="manualMode">
      <div class="card">
        <div class="label">联系人 ID（微信 ID 或群 ID）</div>
        <div class="contact-input">
          <input id="contactId" type="text" placeholder="输入联系人 ID" />
        </div>

        <div class="label">对方发来的消息</div>
        <textarea id="message" placeholder="粘贴对方的消息..."></textarea>

        <div class="label" style="margin-top:12px">我现在想...</div>
        <div class="goal-row" id="goalRow">
          <button class="goal-btn" data-goal="agree">答应</button>
          <button class="goal-btn" data-goal="decline">婉拒</button>
          <button class="goal-btn" data-goal="advance">推进</button>
          <button class="goal-btn" data-goal="maintain">维持关系</button>
          <button class="goal-btn active" data-goal="casual">随便回</button>
        </div>

        <button class="btn" id="submitBtn" onclick="submitManual()">生成回复建议</button>
      </div>
    </div>

    <!-- 右侧：回复建议 -->
    <div class="right-panel">
      <div id="result" style="display:none">
        <div class="card" id="analysisCard">
          <div class="section-title">局势分析</div>
          <div class="analysis" id="analysisText"></div>
          <div id="weaknessTip"></div>
          <div id="frameworkTip"></div>
        </div>

        <div class="card">
          <div class="section-title">回复建议</div>
          <div id="repliesContainer"></div>
        </div>

        <div class="card" id="avoidCard">
          <div class="section-title">建议避免</div>
          <div id="avoidContainer"></div>
        </div>
      </div>

      <div id="placeholder" class="card">
        <div class="empty-state">选择一条消息查看回复建议</div>
      </div>

      <!-- 自动模式：选中消息后显示，点击按钮才分析 -->
      <div id="selectedCard" class="card" style="display:none">
        <div class="section-title">选中的消息</div>
        <div class="message-box" id="selectedContent"></div>
        <div class="label" style="margin-top:12px">我现在想...</div>
        <div class="goal-row" id="autoGoalRow">
          <button class="goal-btn" data-goal="agree">答应</button>
          <button class="goal-btn" data-goal="decline">婉拒</button>
          <button class="goal-btn" data-goal="advance">推进</button>
          <button class="goal-btn" data-goal="maintain">维持关系</button>
          <button class="goal-btn active" data-goal="casual">随便回</button>
        </div>
        <button class="btn" id="analyzeBtn" onclick="analyzeSelected()">生成回复建议</button>
      </div>
    </div>
  </div>
</div>

<script>
  let ws = null
  let messages = []
  let selectedGoal = 'casual'
  let selectedMessage = null
  let isAutoMode = true

  // 模式切换
  document.getElementById('modeToggle').addEventListener('change', (e) => {
    isAutoMode = e.target.checked
    document.getElementById('autoLabel').classList.toggle('active', isAutoMode)
    document.getElementById('manualLabel').classList.toggle('active', !isAutoMode)
    document.getElementById('autoMode').style.display = isAutoMode ? 'block' : 'none'
    document.getElementById('manualMode').classList.toggle('active', !isAutoMode)

    if (!isAutoMode) {
      // 切换到手动模式时断开 WebSocket
      if (ws) ws.close()
    } else {
      // 切换到自动模式时重新连接
      connectWebSocket()
    }
  })

  // 目标选择
  document.querySelectorAll('.goal-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.goal-btn').forEach(b => b.classList.remove('active'))
      btn.classList.add('active')
      selectedGoal = btn.dataset.goal
    })
  })

  // WebSocket 连接
  function connectWebSocket() {
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:'
    const wsUrl = `${protocol}//${window.location.host}`

    ws = new WebSocket(wsUrl)

    ws.onopen = () => {
      console.log('WebSocket connected')
      document.getElementById('statusBadge').className = 'status-badge connected'
      document.getElementById('statusBadge').textContent = '已连接'
    }

    ws.onclose = () => {
      console.log('WebSocket disconnected')
      document.getElementById('statusBadge').className = 'status-badge disconnected'
      document.getElementById('statusBadge').textContent = '未连接'

      // 自动重连
      if (isAutoMode) {
        setTimeout(connectWebSocket, 3000)
      }
    }

    ws.onerror = (err) => {
      console.error('WebSocket error:', err)
    }

    ws.onmessage = (event) => {
      const msg = JSON.parse(event.data)

      if (msg.type === 'new_message') {
        addMessage(msg.data)
      }
    }
  }

  // 添加新消息
  function addMessage(msg) {
    // 避免重复
    if (messages.find(m => m.id === msg.id)) return

    messages.unshift(msg)
    renderMessages()
  }

  // 渲染消息列表
  function renderMessages() {
    const container = document.getElementById('messagesContainer')

    if (messages.length === 0) {
      container.innerHTML = '<div class="empty-state">等待新消息...</div>'
      return
    }

    container.innerHTML = messages.map(msg => {
      const time = new Date(msg.timestamp).toLocaleString('zh-CN', {
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      })
      const isSelected = selectedMessage && selectedMessage.id === msg.id

      return `
        <div class="message-item ${isSelected ? 'selected' : ''}" onclick="selectMessage('${msg.id}')">
          <div class="message-header">
            <span class="message-contact">${escapeHtml(msg.contactName)}</span>
            <span class="message-time">${time}</span>
          </div>
          <div class="message-content">${escapeHtml(msg.content)}</div>
        </div>
      `
    }).join('')
  }

  // 自动模式目标选择
  document.querySelectorAll('#autoGoalRow .goal-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#autoGoalRow .goal-btn').forEach(b => b.classList.remove('active'))
      btn.classList.add('active')
      selectedGoal = btn.dataset.goal
    })
  })

  // 选择消息（只高亮，不自动分析）
  function selectMessage(msgId) {
    selectedMessage = messages.find(m => m.id === msgId)
    if (!selectedMessage) return

    renderMessages()

    // 右侧显示选中消息，等待用户点击分析
    document.getElementById('placeholder').style.display = 'none'
    document.getElementById('result').style.display = 'none'
    document.getElementById('selectedCard').style.display = 'block'
    document.getElementById('selectedContent').textContent = selectedMessage.content
    document.getElementById('analyzeBtn').disabled = false
    document.getElementById('analyzeBtn').textContent = '生成回复建议'
  }

  // 点击按钮后才触发分析
  async function analyzeSelected() {
    if (!selectedMessage) return
    const btn = document.getElementById('analyzeBtn')
    btn.disabled = true
    btn.textContent = '生成中...'
    document.getElementById('selectedCard').style.display = 'none'
    await generateReply(selectedMessage.contactId, selectedMessage.content)
  }

  // 生成回复建议
  async function generateReply(contactId, message) {
    document.getElementById('placeholder').style.display = 'none'
    document.getElementById('result').style.display = 'none'

    try {
      const res = await fetch('/api/suggest', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contactId, message, goal: selectedGoal })
      })
      const data = await res.json()
      if (data.ok) {
        renderResult(data.result)
      } else {
        alert('生成失败：' + data.error)
      }
    } catch (e) {
      alert('请求失败，请检查服务是否启动')
    }
  }

  // 手动模式提交
  async function submitManual() {
    const contactId = document.getElementById('contactId').value.trim()
    const message = document.getElementById('message').value.trim()
    if (!contactId || !message) { alert('请填写联系人 ID 和消息内容'); return }

    const btn = document.getElementById('submitBtn')
    btn.disabled = true
    btn.textContent = '生成中...'
    document.getElementById('result').style.display = 'none'
    document.getElementById('placeholder').style.display = 'none'

    try {
      await generateReply(contactId, message)
    } finally {
      btn.disabled = false
      btn.textContent = '生成回复建议'
    }
  }

  function renderResult(r) {
    document.getElementById('analysisText').textContent = r.situationAnalysis || ''

    const weaknessTip = document.getElementById('weaknessTip')
    weaknessTip.innerHTML = r.weaknessTip ? `<div class="tip">注意：${r.weaknessTip}</div>` : ''

    const frameworkTip = document.getElementById('frameworkTip')
    frameworkTip.innerHTML = r.frameworkTip ? `<div class="framework-tip">${r.frameworkTip}</div>` : ''

    const repliesContainer = document.getElementById('repliesContainer')
    repliesContainer.innerHTML = r.replies.map(reply => `
      <div class="reply-item ${reply.isRecommended ? 'recommended' : ''}">
        ${reply.isRecommended ? '<span class="reply-badge">推荐</span>' : ''}
        <button class="copy-btn" onclick="copyText(this, '${escapeAttr(reply.text)}')">复制</button>
        <div class="reply-text">${escapeHtml(reply.text)}</div>
        <div class="reply-reason">${escapeHtml(reply.direction)}</div>
      </div>
    `).join('')

    const avoidContainer = document.getElementById('avoidContainer')
    if (r.avoid && r.avoid.length > 0) {
      avoidContainer.innerHTML = r.avoid.map(a => `
        <div class="avoid-item">
          <span class="avoid-text">"${escapeHtml(a.text)}"</span>
          <span class="avoid-reason"> → ${escapeHtml(a.reason)}</span>
        </div>
      `).join('')
      document.getElementById('avoidCard').style.display = ''
    } else {
      document.getElementById('avoidCard').style.display = 'none'
    }

    document.getElementById('result').style.display = 'block'
  }

  function copyText(btn, text) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = '已复制'
      btn.classList.add('copied')
      setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('copied') }, 1500)
    })
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
  }
  function escapeAttr(s) {
    return String(s).replace(/'/g, "\\'").replace(/\n/g, ' ')
  }

  // 启动时自动连接
  if (isAutoMode) {
    connectWebSocket()
  }
</script>
</body>
</html>
